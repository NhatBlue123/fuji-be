# ============================================
# APPLICATION CONFIG
# ============================================
spring.application.name=fuji
server.port=8181

# ============================================
# DATABASE CONFIG (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:4747/fuji_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=se47
spring.datasource.password=capstone2@se47
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tắt Hibernate cache để hot reload hoạt động đúng
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ============================================
# DEVTOOLS CONFIG (Hot Reload)
# ============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Thêm các thư mục cần watch
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
# Loại trừ các file không cần restart
spring.devtools.restart.exclude=static/**,public/**,templates/**

# ============================================
# MAIL CONFIG (Gmail SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# FILE UPLOAD CONFIG (Multer equivalent)
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================
# LOGGING CONFIG
# ============================================
logging.level.root=INFO
logging.level.com.example.fuji=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# JWT CONFIG
# ============================================
fuji.jwt.secret=${JWT_SECRET}
fuji.jwt.expiration=${JWT_EXPIRATION}
fuji.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION}

# ============================================
# REDIS CONFIG (Uncomment khi dùng Redis)
# ============================================
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
# spring.data.redis.password=
# spring.data.redis.timeout=60000

# ============================================
# CLOUDINARY CONFIG
# ============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
