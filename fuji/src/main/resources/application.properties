# ============================================
# APPLICATION CONFIG
# ============================================
spring.application.name=fuji
server.port=${SERVER_PORT:8181}

# ============================================
# DATABASE CONFIG (MySQL)
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:4747/fuji_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:se47}
spring.datasource.password=${DB_PASSWORD:capstone2@se47}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#mail config
logging.level.org.springframework.security=DEBUG
# Tắt Hibernate cache để hot reload hoạt động đúng
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ============================================
# DEVTOOLS CONFIG (Hot Reload)
# ============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Thêm các thư mục cần watch
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
# Loại trừ các file không cần restart
spring.devtools.restart.exclude=static/**,public/**,templates/**

